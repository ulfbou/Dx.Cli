name: Release

# Triggers on any tag push matching v*, e.g. v0.1.0, v1.2.3
on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT: src/Dx.Cli/Dx.Cli.csproj

jobs:
  # ── Build & publish for all target platforms ──────────────────────────────────
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: dx.exe
          - rid: win-arm64
            os: windows-latest
            artifact: dx.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: dx
          - rid: osx-arm64
            os: macos-latest
            artifact: dx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish/${{ matrix.rid }}

      # ── Windows: zip the exe ──────────────────────────────────────────────────
      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $rid     = "${{ matrix.rid }}"
          $src     = "publish/$rid/dx.exe"
          $dest    = "publish/dx-$version-$rid.zip"
          Compress-Archive -Path $src -DestinationPath $dest
          $hash = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          Write-Output "SHA256 ($dest): $hash"
          # Emit as a step output for use in the release notes
          "sha256=$hash" | Out-File -Append $env:GITHUB_OUTPUT

      # ── Linux / macOS: tar.gz the binary ─────────────────────────────────────
      - name: Tar (Unix)
        if: runner.os != 'Windows'
        run: |
          version="${{ github.ref_name }}"
          rid="${{ matrix.rid }}"
          chmod +x publish/$rid/dx
          tar -czf publish/dx-$version-$rid.tar.gz -C publish/$rid dx
          sha256sum publish/dx-$version-$rid.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dx-${{ matrix.rid }}
          path: |
            publish/dx-*.zip
            publish/dx-*.tar.gz

  # ── Create GitHub Release and attach all artifacts ───────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: dx ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
