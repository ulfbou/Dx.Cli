name: CI / Release

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── verify-inputs ──────────────────────────────────────────────────────────
  # Validates all pipeline inputs before any matrix build begins.
  # Runs on PRs too — catches manifest regressions before they reach a tag.
  verify-inputs:
    name: Verify Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest template
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE_DIR="manifests/u/ulfbou/dxs/_template"
          INSTALLER="$TEMPLATE_DIR/ulfbou.dxs.installer.yaml"
          VERSION_MANIFEST="$TEMPLATE_DIR/ulfbou.dxs.yaml"
          LOCALE_MANIFEST="$TEMPLATE_DIR/ulfbou.dxs.locale.en-US.yaml"

          # ── 1. Required files exist ────────────────────────────────────────
          for f in "$INSTALLER" "$VERSION_MANIFEST" "$LOCALE_MANIFEST"; do
            [[ -f "$f" ]] \
              || { echo "error: required file not found: $f"; exit 1; }
          done
          echo "ok: all template files present"

          # ── 2. Installer contains exactly one x64 SHA token ───────────────
          COUNT_X64=$(grep -c '__SHA256_WIN_X64__' "$INSTALLER" || true)
          [[ "$COUNT_X64" -eq 1 ]] \
            || { echo "error: expected exactly 1 __SHA256_WIN_X64__ token, found $COUNT_X64"; exit 1; }

          # ── 3. Installer contains exactly one arm64 SHA token ─────────────
          COUNT_ARM=$(grep -c '__SHA256_WIN_ARM64__' "$INSTALLER" || true)
          [[ "$COUNT_ARM" -eq 1 ]] \
            || { echo "error: expected exactly 1 __SHA256_WIN_ARM64__ token, found $COUNT_ARM"; exit 1; }

          # ── 4. All three templates contain the __VERSION__ token ──────────
          for f in "$INSTALLER" "$VERSION_MANIFEST" "$LOCALE_MANIFEST"; do
            grep -q '__VERSION__' "$f" \
              || { echo "error: __VERSION__ token missing from $f"; exit 1; }
          done
          echo "ok: all VERSION tokens present"

          # ── 5. Templates are not already patched (no real SHA values) ─────
          if grep -qE '^[[:space:]]*InstallerSha256:[[:space:]]+[0-9a-f]{64}' "$INSTALLER"; then
            echo "error: installer template appears to already contain real SHA values"
            grep -E 'InstallerSha256' "$INSTALLER"
            exit 1
          fi
          echo "ok: no pre-patched SHA values detected"

          # ── 6. Dry-run token substitution (catches sed issues on PRs) ─────
          DUMMY_VER="0.0.0"
          DUMMY_SHA="deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"

          RENDERED=$(sed \
            -e "s/__VERSION__/$DUMMY_VER/g" \
            -e "s/__SHA256_WIN_X64__/$DUMMY_SHA/g" \
            -e "s/__SHA256_WIN_ARM64__/$DUMMY_SHA/g" \
            "$INSTALLER")

          # No tokens should survive substitution
          if echo "$RENDERED" | grep -qE '__[A-Z0-9_]+__'; then
            echo "error: unreplaced tokens remain after dry-run substitution:"
            echo "$RENDERED" | grep -E '__[A-Z0-9_]+__'
            exit 1
          fi
          echo "ok: dry-run substitution produced no residual tokens"

          # ── 7. Prevent hardcoded version values ─────────────────────────
          for f in "$INSTALLER" "$VERSION_MANIFEST" "$LOCALE_MANIFEST"; do
            grep -q '__VERSION__' "$f" || exit 1
            if grep -qE 'PackageVersion:[[:space:]]+[0-9]' "$f"; then
              echo "error: hardcoded version in $f"
              exit 1
            fi
          done

          echo "ok: manifest template validation passed"

  # ── build ──────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    needs: verify-inputs
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            suffix: .exe
          - rid: win-arm64
            os: windows-latest
            suffix: .exe
          - rid: linux-x64
            os: ubuntu-latest
            suffix: ""
          - rid: linux-arm64
            os: ubuntu-latest
            suffix: ""
          - rid: osx-x64
            os: macos-latest
            suffix: ""
          - rid: osx-arm64
            os: macos-latest
            suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version env vars
        shell: bash
        run: |
          REF_NAME="${{ github.ref_name }}"
          BARE="${REF_NAME#v}"
          # Fall back to 0.0.0-dev for non-tag runs (PRs, workflow_dispatch)
          if [[ "$BARE" == "$REF_NAME" ]]; then BARE="0.0.0-dev"; fi
          echo "VERSION_BARE=$BARE"          >> "$GITHUB_ENV"
          echo "VERSION_STABLE=${BARE%%-*}"  >> "$GITHUB_ENV"

      - name: Publish ${{ matrix.rid }}
        shell: bash
        run: |
          dotnet publish src/Dx.Cli/Dx.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish/${{ matrix.rid }}

      - name: Package artifact
        shell: pwsh
        run: |
          $rid    = "${{ matrix.rid }}"
          $ver    = "${{ env.VERSION_BARE }}"
          $suffix = "${{ matrix.suffix }}"
          $isWin  = $rid.StartsWith("win")

          $ext     = if ($isWin) { "zip" } else { "tar.gz" }
          $outPath = "dist/dxs-${ver}-${rid}.${ext}"
          $binary  = "publish/${rid}/dxs${suffix}"

          New-Item -ItemType Directory -Force dist | Out-Null

          if ($isWin) {
            Compress-Archive -Path $binary -DestinationPath $outPath -Force
          } else {
            # tar preserves the executable bit — critical for Linux/macOS
            bash -c "chmod +x '$binary' && tar -czf '$outPath' -C 'publish/$rid' 'dxs'"
          }

          Write-Host "Packaged: $outPath"
          "PKG_PATH=$outPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload WinGet manifests
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests-${{ github.ref_name }}
          path: manifests/u/ulfbou/dxs/${{ env.VERSION_BARE }}/

      - name: Upload artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v4
        with:
          name: dxs-${{ env.VERSION_BARE }}-${{ matrix.rid }}
          path: ${{ env.PKG_PATH }}
          retention-days: 3

  # ── publish ────────────────────────────────────────────────────────────────
  publish:
    name: Create Release
    needs: [build, verify-inputs]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version env vars
        shell: bash
        run: |
          BARE="${GITHUB_REF_NAME#v}"
          echo "VERSION_BARE=$BARE"          >> "$GITHUB_ENV"
          echo "VERSION_STABLE=${BARE%%-*}"  >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify Windows artifacts exist before hashing
        shell: bash
        run: |
          set -euo pipefail
          X64="dist/dxs-${VERSION_BARE}-win-x64.zip"
          ARM="dist/dxs-${VERSION_BARE}-win-arm64.zip"

          [[ -f "$X64" ]] \
            || { echo "error: expected artifact not found: $X64"; ls dist/; exit 1; }
          [[ -f "$ARM" ]] \
            || { echo "error: expected artifact not found: $ARM"; ls dist/; exit 1; }

          echo "ok: both Windows artifacts present"

      - name: Compute SHA256 hashes (Windows ZIPs for WinGet manifest)
        shell: bash
        run: |
          set -euo pipefail
          sha_x64=$(sha256sum "dist/dxs-${VERSION_BARE}-win-x64.zip"  | awk '{print tolower($1)}')
          sha_arm=$(sha256sum "dist/dxs-${VERSION_BARE}-win-arm64.zip" | awk '{print tolower($1)}')
          echo "SHA_X64=$sha_x64" >> "$GITHUB_ENV"
          echo "SHA_ARM=$sha_arm" >> "$GITHUB_ENV"
          echo "win-x64  SHA256: $sha_x64"
          echo "win-arm64 SHA256: $sha_arm"

      - name: Generate WinGet manifests from templates
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATE_DIR="manifests/u/ulfbou/dxs/_template"
          OUT_DIR="dist/winget/${VERSION_STABLE}"

          mkdir -p "$OUT_DIR"

          for f in "$TEMPLATE_DIR"/*.yaml; do
            fname=$(basename "$f")
            sed \
              -e "s/__VERSION__/${VERSION_STABLE}/g" \
              -e "s/__SHA256_WIN_X64__/${SHA_X64}/g" \
              -e "s/__SHA256_WIN_ARM64__/${SHA_ARM}/g" \
              "$f" > "$OUT_DIR/$fname"
            echo "Generated: $OUT_DIR/$fname"
          done

      - name: Verify generated manifests — no residual tokens
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="dist/winget/${VERSION_STABLE}"

          if grep -rlE '__[A-Z0-9]+(_[A-Z0-9]+)*__' "$OUT_DIR/"; then
            echo "error: unreplaced tokens remain in generated manifests:"
            grep -rnE '__[A-Z0-9_]+__' "$OUT_DIR/"
            exit 1
          fi
          echo "ok: no residual tokens in generated manifests"

      - name: Verify generated installer manifest — SHAs are real hashes
        shell: bash
        run: |
          set -euo pipefail
          INSTALLER="dist/winget/${VERSION_STABLE}/ulfbou.dxs.installer.yaml"

          # 1. Verify that the architecture sections exist
          grep -q "Architecture: x64" "$INSTALLER" || { echo "error: x64 block missing"; exit 1; }
          grep -q "Architecture: arm64" "$INSTALLER" || { echo "error: arm64 block missing"; exit 1; }

          # 2. Verify that real SHA256 hashes (64 hex chars) are present
          # We expect exactly 2 (one for x64, one for arm64)
          SHA_COUNT=$(grep -cE "InstallerSha256: [0-9a-f]{64}" "$INSTALLER" || true)
          
          if [[ "$SHA_COUNT" -ne 2 ]]; then
            echo "error: expected 2 real SHA256 values in installer manifest, found $SHA_COUNT"
            cat "$INSTALLER"
            exit 1
          fi

          # 3. Must contain the correct version string
          grep -q "PackageVersion: ${VERSION_STABLE}" "$INSTALLER" \
            || { echo "error: PackageVersion mismatch in installer manifest"; cat "$INSTALLER"; exit 1; }

          echo "ok: installer manifest contains 2 real SHAs and correct version"
          echo "--- generated installer manifest ---"
          cat "$INSTALLER"

      - name: Upload WinGet manifests as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests-${{ env.VERSION_BARE }}
          path: dist/winget/${{ env.VERSION_STABLE }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: dxs ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/dxs-*.zip
            dist/dxs-*.tar.gz
            dist/winget/${{ env.VERSION_STABLE }}/*.yaml

      # ── NuGet (stable releases only) ────────────────────────────────────────
      - name: Pack NuGet tool
        if: "!contains(github.ref_name, '-')"
        run: |
          dotnet pack src/Dx.Cli/Dx.Cli.csproj \
            -c Release \
            -o nupkg

      - name: Push to NuGet
        if: "!contains(github.ref_name, '-')"
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ── Homebrew tap (stable releases only) ─────────────────────────────────
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        if: "!contains(github.ref_name, '-')"
        with:
          formula-name: dxs
          homebrew-tap: ulfbou/homebrew-tap
          # Points to the Apple Silicon build as the primary Homebrew target.
          # Intel Mac (osx-x64) multi-arch support is planned for a future release.
          download-url: https://github.com/ulfbou/dx.cli/releases/download/${{ github.ref_name }}/dxs-${{ env.VERSION_BARE }}-osx-arm64.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
