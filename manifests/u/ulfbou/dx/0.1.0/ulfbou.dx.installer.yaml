# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json

PackageIdentifier: ulfbou.dx
PackageVersion: 0.1.0

# dx is distributed as a ZIP containing a single portable executable.
# winget extracts the ZIP, registers dx.exe as a portable command alias,
# and adds it to the user's PATH — no elevation required.
InstallerType: zip

# The command name users will type after installation.
Commands:
  - dx

Installers:
